<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tiny Radio</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="radio-container">
        <div id="message">
            <div id="msg-title"></div>
            <div id="msg-text"></div>
        </div>
        <img id="radio-base" src="assets/radio_base.png" alt="radio">
        <img id="antenna-mount" src="assets/antenna_base.png" alt="antenna mount">
        <img id="antenna-stick" src="assets/antenna.png" alt="antenna stick">
        <img id="needle" src="assets/needle.png" alt="needle">
        <img id="big-knob" src="assets/big_knob.png" alt="big knob">
        <img id="small-knob" src="assets/small_knob.png" alt="small knob">

        <img id="btn-1" class="btn" src="assets/normal_button.png" alt="">
        <img id="btn-2" class="btn" src="assets/normal_button.png" alt="">
        <img id="btn-3" class="btn" src="assets/normal_button.png" alt="">
        <img id="btn-4" class="btn" src="assets/normal_button.png" alt="">
        <img id="btn-red" class="btn" src="assets/red_button.png" alt="">

        <div id="zone-big-back" class="zone zone-upper-left"></div>
        <div id="zone-big-forward" class="zone zone-upper-right"></div>
        <div id="zone-small-back" class="zone zone-lower-left"></div>
        <div id="zone-small-forward" class="zone zone-lower-right"></div>
    </div>
    <div id="freq-display">
        <div id="freq-number">1.0</div>
        <div id="freq-unit">MHz</div>
    </div>
    <a id="journal-link" href="journal.html" aria-label="Open journal">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </a>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/radio.js"></script>
</body>

</html>
