<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tiny Radio</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="radio-container">
        <img id="radio-base" src="assets/radio_base.png" alt="radio">
        <img id="antenna-mount" src="assets/antenna_base.png" alt="antenna mount">
        <img id="antenna-stick" src="assets/antenna.png" alt="antenna stick">
        <img id="needle" src="assets/needle.png" alt="needle">

    </div>
    <div id="freq-display">
        <div id="freq-number">1.0</div>
        <div id="freq-unit">MHz</div>
    </div>
</body>

</html>
